<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Force | نظام الإدارة الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="loader-wrapper"><div class="loader"></div></div>

    <section id="auth-view" class="view">
        <div class="container auth-card">
            <div class="logo-box">
                <i class="fa-solid fa-bolt-lightning logo-icon"></i>
                <h1>ديجيتال فورس</h1>
                <p>سجل دخولك لمرة واحدة فقط</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label>اسمك الثنائي</label>
                    <input type="text" id="login-name" placeholder="مثلاً: محمد علي" required>
                </div>
                <div class="input-group">
                    <label>رقم الجوال</label>
                    <input type="tel" id="login-phone" placeholder="05xxxxxxxx" required>
                </div>
                <button type="submit" class="btn-primary">اعتماد الجهاز والدخول</button>
            </form>
        </div>
    </section>

    <section id="main-view" class="view">
        <header class="main-header">
            <div class="user-info">
                <div class="avatar"><i class="fa-solid fa-user-gear"></i></div>
                <div>
                    <h2 id="header-user-name">مرحباً</h2>
                    <span class="status-badge"><i class="fa-solid fa-circle"></i> متصل بنظام ديجيتال</span>
                </div>
            </div>
            <button class="btn-add-circle" onclick="openModal('add-modal')"><i class="fa-solid fa-plus"></i></button>
        </header>

        <div class="container">
            <div class="stats-bar">
                <p>إجمالي اشتراكاتك النشطة: <b id="count-active" class="highlight">0</b></p>
            </div>
            <div id="subs-container" class="subs-list"></div>
        </div>
    </section>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إضافة عميل جديد</h3>
                <span class="close-btn" onclick="closeModal('add-modal')">&times;</span>
            </div>
            <form id="add-sub-form">
                <div class="row">
                    <div class="input-group"><label>الاشتراك</label><input type="text" id="s-name" required></div>
                    <div class="input-group"><label>اسم العميل</label><input type="text" id="c-name" required></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>رقم العميل</label><input type="tel" id="c-phone" required></div>
                    <div class="input-group"><label>رقم الطلب</label><input type="text" id="c-order" required></div>
                </div>
                <div class="row">
                    <div class="input-group"><label>السعر</label><input type="number" id="s-price" step="0.01" required></div>
                    <div class="input-group"><label>المدة</label>
                        <select id="s-duration">
                            <option value="1">شهر</option><option value="2">شهرين</option>
                            <option value="3">3 أشهر</option><option value="6">6 أشهر</option><option value="12">سنة</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group"><label>رقم البروفايل</label>
                        <select id="s-profile">
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                            <option value="7">7</option><option value="8">8</option>
                        </select>
                    </div>
                    <div class="input-group"><label>نوع الحساب</label>
                        <select id="s-type">
                            <option value="مشترك">مشترك</option><option value="خاص">خاص</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label>الإيميل (اختياري)</label><input type="email" id="s-email"></div>
                <button type="submit" class="btn-primary">إضافة وإرسال التقرير</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
