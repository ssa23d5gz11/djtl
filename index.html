<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">إنشاء طلب جديد ✅</h3>
        <input type="hidden" id="edit-id"> <input type="text" id="s-name" placeholder="اسم الاشتراك">
        <input type="text" id="c-name" placeholder="اسم العميل">
        <input type="tel" id="c-phone" placeholder="رقم جوال العميل (10 أرقام)" maxlength="10">
        <input type="text" id="c-order" placeholder="رقم الطلب">
        <div class="row">
            <input type="number" id="s-price" placeholder="السعر">
            <select id="s-dur">
                <option value="1">شهر</option>
                <option value="3">3 أشهر</option>
                <option value="6">6 أشهر</option>
                <option value="12">سنة</option>
            </select>
        </div>
        <input type="email" id="c-email" placeholder="الإيميل">
        <input type="text" id="c-pass" placeholder="كلمة المرور">
        <button id="save-btn" class="btn-primary" onclick="saveSub()">حفظ في نظام ديجيتال فورس</button>
        <button class="btn-close" onclick="closeModal()">إلغاء</button>
    </div>
</div>
